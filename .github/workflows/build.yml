name: Build UIInfoSuite2Alt
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Extract source
        run: unzip UIInfoSuite2Alt-mobile-patch.zip
      - name: Disable game path check
        run: |
          cd UIInfoSuite2Alt-main/UIInfoSuite2Alt
          sed -i 's|net6.0-windows|net6.0|g' UIInfoSuite2Alt.csproj
          dotnet add package Pathoschild.Stardew.ModBuildConfig --version 4.4.0 || true
      - name: Build ignoring game check
        run: |
          cd UIInfoSuite2Alt-main/UIInfoSuite2Alt
          dotnet build -c Release /p:GamePath=/tmp/sdv /p:EnableGameDeployment=false /p:IgnoreGameDirectory=true
      - uses: actions/upload-artifact@v4
        with:
          name: UIInfoSuite2Alt-mobile
          path: "UIInfoSuite2Alt-main/UIInfoSuite2Alt/bin/**/*.dll"
